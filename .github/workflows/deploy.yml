name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@molroo-io'

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PKG_TOKEN }}

      - run: npm run build
        env:
          VITE_MOLROO_API_KEY: ${{ secrets.VITE_MOLROO_API_KEY }}
          VITE_LLM_PROVIDER: google-generative-ai
          VITE_LLM_MODEL: gemini-2.0-flash

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=molroo-hyori
          workingDirectory: .
